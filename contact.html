<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | BOUSAI ACTION 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c-primary:    #0077b6;
      --c-dark:       #12324a;
      --c-orange:     #ff9f1c;
      --c-bg:         #f4faff;
      --c-light-blue: #e6f4ff;
      --c-border:     #dbe3ee;
      --c-input-bg:   #fbfdff;
      --c-label:      #1f2937;
      --c-placeholder:#9ea6b2;
      --c-note:       #6b7280;
      --c-required:   #e5484d;
      --c-check-text: #384151;
      --c-btn-blue:   #1f7ae0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--c-bg);
      color: var(--c-dark);
    }

    /* ── NAV ── */
    .nav {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 72px;
      background: var(--c-dark);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      z-index: 1000;
    }

    .nav-logo {
      position: absolute;
      left: 38px; top: 5px;
      width: 161px; height: 62px;
      object-fit: contain;
    }

    .nav-links {
      position: absolute;
      left: 437px; top: 0;
      display: flex;
      list-style: none;
    }

    .nav-links a,
    .nav-links span {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 110px;
      height: 72px;
      color: #fff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 1.2px;
      transition: background 0.2s;
    }
    .nav-links a:hover { background: rgba(255,255,255,0.1); }
    .nav-links .nav-current { text-decoration: underline; }

    /* ── MAIN ── */
    main {
      padding-top: 72px;
    }

    .contact-wrapper {
      padding: 135px 97px;
    }

    /* ── FORM CARD ── */
    .form-card {
      width: 1271px;
      background: #fff;
      border: 1px solid var(--c-border);
      border-radius: 32px;
      box-shadow: 0 24px 70px rgba(18, 53, 91, 0.13);
      padding: 34px 38px 58px;
    }

    .form-title {
      font-size: 28px;
      font-weight: 800;
      color: #12355b;
      line-height: 1.3;
    }

    .form-note {
      margin-top: 10px;
      font-size: 14px;
      font-weight: 400;
      color: var(--c-note);
      line-height: 1.6;
    }

    /* ── FORM GROUPS ── */
    .form-group {
      margin-top: 18px;
    }

    .form-label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 14px;
      font-weight: 700;
      color: var(--c-label);
      line-height: 1.3;
      margin-bottom: 11px;
    }

    .required-mark {
      color: var(--c-required);
      font-weight: 700;
    }

    .form-input {
      width: 1184px;
      height: 54px;
      background: var(--c-input-bg);
      border: 1px solid var(--c-border);
      border-radius: 14px;
      padding: 0 18px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--c-label);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input::placeholder {
      color: var(--c-placeholder);
    }
    .form-input:focus {
      border-color: var(--c-primary);
      box-shadow: 0 0 0 3px rgba(0, 119, 182, 0.12);
    }

    /* ── CHECKBOX GROUP ── */
    .checkbox-group {
      width: 1184px;
      background: var(--c-input-bg);
      border: 1px solid var(--c-border);
      border-radius: 16px;
      padding: 20px 20px 20px 20px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      cursor: pointer;
      font-size: 14px;
      font-weight: 400;
      color: var(--c-check-text);
      line-height: 1.4;
      user-select: none;
    }

    .checkbox-item input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 18px; height: 18px;
      background: #fff;
      border: 1px solid var(--c-border);
      border-radius: 5px;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: background 0.15s, border-color 0.15s;
    }
    .checkbox-item input[type="checkbox"]:checked {
      background: var(--c-primary);
      border-color: var(--c-primary);
    }
    .checkbox-item input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 4px; top: 2px;
      width: 6px; height: 10px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }
    .checkbox-item input[type="checkbox"]:focus {
      outline: 2px solid rgba(0, 119, 182, 0.3);
      outline-offset: 1px;
    }

    /* ── TEXTAREA ── */
    .form-textarea {
      width: 1184px;
      height: 110px;
      background: var(--c-input-bg);
      border: 1px solid var(--c-border);
      border-radius: 14px;
      padding: 16px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--c-label);
      resize: vertical;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-textarea::placeholder {
      color: var(--c-placeholder);
    }
    .form-textarea:focus {
      border-color: var(--c-primary);
      box-shadow: 0 0 0 3px rgba(0, 119, 182, 0.12);
    }

    /* ── SUBMIT ── */
    .form-submit-row {
      margin-top: 23px;
    }

    .btn-submit {
      width: 1184px;
      height: 58px;
      background: var(--c-btn-blue);
      border: none;
      border-radius: 16px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-submit:hover  { opacity: 0.88; transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }

    /* ── FOOTER ── */
    footer {
      background: var(--c-dark);
      height: 341px;
      position: relative;
      overflow: hidden;
      padding: 90px 100px 0;
    }

    .footer-title {
      font-size: 42px;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
    }

    .footer-tagline {
      font-size: 24px;
      font-weight: 500;
      color: #ddf3ff;
      margin-top: 15px;
      line-height: 1.3;
    }

    .footer-org {
      position: absolute;
      top: 244px; left: 100px;
      font-size: 16px;
      font-weight: 400;
      color: #bfeaff;
      line-height: 1.3;
    }

    /* ── BACKDROP ── */
    .nav-backdrop {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
    }
    .nav-backdrop.open { display: block; }

    .nav-close { display: none; }
    .nav-close-li { display: none; }

    /* ── HAMBURGER ── */
    .nav-hamburger {
      display: none;
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      flex-direction: column;
      gap: 5px;
    }
    .nav-hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: #fff;
      transition: transform 0.3s, opacity 0.3s;
    }
    .nav-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .nav-hamburger.open span:nth-child(2) { opacity: 0; }
    .nav-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      /* NAV */
      .nav { height: 60px; }
      .nav-logo {
        left: 50%;
        transform: translateX(-50%);
        top: 8px;
        width: 110px; height: 44px;
      }
      .nav-hamburger { display: flex; }

      /* サイドドロワー */
      .nav-links {
        position: fixed;
        top: 0; left: auto; right: -100%;
        width: 75%; max-width: 300px;
        height: 100vh;
        background: var(--c-dark);
        flex-direction: column;
        align-items: flex-start;
        justify-content: flex-start;
        padding: 0;
        display: flex;
        visibility: visible; opacity: 1;
        transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 1001;
        box-shadow: -4px 0 24px rgba(0,0,0,0.3);
      }
      .nav-links.open { right: 0; }

      /* 閉じるボタン行 */
      .nav-close-li {
        display: flex;
        width: 100%;
        justify-content: flex-end;
        padding: 12px 16px;
        border-bottom: 1px solid rgba(255,255,255,0.08);
      }
      .nav-close {
        display: block;
        background: none; border: none;
        color: #fff; font-size: 22px;
        cursor: pointer; padding: 4px 8px;
        opacity: 0.8; transition: opacity 0.2s;
      }
      .nav-close:hover { opacity: 1; }

      /* リンク行 */
      .nav-links li { width: 100%; border-bottom: 1px solid rgba(255,255,255,0.08); }
      .nav-links li:last-child { border-bottom: none; }
      .nav-links a,
      .nav-links span {
        width: 100%; height: 56px;
        padding: 0 24px;
        justify-content: flex-start;
        font-size: 15px; letter-spacing: 2px;
        background: none; transition: background 0.2s;
      }
      .nav-links a:hover { background: rgba(255,255,255,0.08); opacity: 1; }

      /* MAIN / CONTACT FORM */
      main { padding-top: 60px; }
      .contact-wrapper { padding: 40px 16px; }
      .form-card { width: 100%; padding: 24px 16px 40px; }
      .form-input { width: 100%; }
      .checkbox-group { width: 100%; }
      .form-textarea { width: 100%; }
      .btn-submit { width: 100%; }

      /* FOOTER */
      footer { height: auto; padding: 40px 16px 32px; }
      .footer-title { font-size: 28px; }
      .footer-tagline { font-size: 16px; }
      .footer-org {
        position: relative;
        top: auto; left: auto;
        margin-top: 24px;
        display: block;
      }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav" aria-label="メインナビゲーション">
    <a href="index.html">
      <img class="nav-logo"
           src="images/logo.png"
           alt="BOUSAI ACTION 2026" />
    </a>
    <ul class="nav-links">
      <li class="nav-close-li">
        <button class="nav-close" aria-label="メニューを閉じる">&#10005;</button>
      </li>
      <li><a href="index.html#about">ABOUT</a></li>
      <li><a href="index.html#contents">CONTENTS</a></li>
      <li><a href="index.html#timetable">TIMETABLE</a></li>
      <li><a href="index.html#sponser">SPONSER</a></li>
      <li><a href="index.html#access">ACCESS</a></li>
      <li><span class="nav-current" aria-current="page">CONTACT</span></li>
    </ul>
    <button class="nav-hamburger" aria-label="メニューを開く" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>
  <div class="nav-backdrop"></div>

  <!-- MAIN -->
  <main>
    <div class="contact-wrapper">
      <div class="form-card">
        <h1 class="form-title">お問い合わせフォーム</h1>
        <p class="form-note">必要事項をご入力ください。担当より3営業日以内にご連絡いたします。</p>

        <form action="#" method="post" novalidate>

          <!-- 貴社名 -->
          <div class="form-group">
            <label class="form-label" for="company">
              貴社名 <span class="required-mark">*</span>
            </label>
            <input class="form-input" type="text" id="company" name="company"
                   placeholder="例：株式会社〇〇" required />
          </div>

          <!-- ご担当者様の氏名 -->
          <div class="form-group">
            <label class="form-label" for="name">
              ご担当者様の氏名 <span class="required-mark">*</span>
            </label>
            <input class="form-input" type="text" id="name" name="name"
                   placeholder="例：山田 太郎" required />
          </div>

          <!-- ご連絡先メールアドレス -->
          <div class="form-group">
            <label class="form-label" for="email">
              ご連絡先メールアドレス <span class="required-mark">*</span>
            </label>
            <input class="form-input" type="email" id="email" name="email"
                   placeholder="example@company.jp" required />
          </div>

          <!-- 電話番号 -->
          <div class="form-group">
            <label class="form-label" for="phone">
              電話番号 <span class="required-mark">*</span>
            </label>
            <input class="form-input" type="tel" id="phone" name="phone"
                   placeholder="03-0000-0000" required />
          </div>

          <!-- 協賛に関するご希望内容 -->
          <div class="form-group">
            <p class="form-label">
              協賛に関するご希望内容 <span class="required-mark">*</span>
            </p>
            <div class="checkbox-group" role="group" aria-label="協賛に関するご希望内容">
              <label class="checkbox-item">
                <input type="checkbox" name="sponsor_type" value="financial" />
                金銭協賛
              </label>
              <label class="checkbox-item">
                <input type="checkbox" name="sponsor_type" value="goods" />
                物品協賛（防災用品、ノベルティなど）
              </label>
              <label class="checkbox-item">
                <input type="checkbox" name="sponsor_type" value="booth" />
                ブース出展・PR協力
              </label>
              <label class="checkbox-item">
                <input type="checkbox" name="sponsor_type" value="other" />
                その他
              </label>
            </div>
          </div>

          <!-- その他、ご要望・ご相談等 -->
          <div class="form-group">
            <label class="form-label" for="message">
              その他、ご要望・ご相談等
            </label>
            <textarea class="form-textarea" id="message" name="message"
                      placeholder="ご希望内容やご相談事項があればご記入ください。"></textarea>
          </div>

          <!-- Submit -->
          <div class="form-submit-row">
            <button class="btn-submit" type="submit">送信する</button>
          </div>

        </form>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <h2 class="footer-title">BOUSAI ACTION 2026</h2>
    <p class="footer-tagline">「防災をもっと身近に、もっと楽しく」</p>
    <p class="footer-org">主催：学生団体 防災me＋デジタルハリウッド大学 グローバルリーダーシップゼミ</p>
  </footer>

  <script>
    const hamburger = document.querySelector('.nav-hamburger');
    const navLinks  = document.querySelector('.nav-links');
    const backdrop  = document.querySelector('.nav-backdrop');
    const closeBtn  = document.querySelector('.nav-close');

    function openMenu() {
      hamburger.classList.add('open');
      navLinks.classList.add('open');
      backdrop.classList.add('open');
      hamburger.setAttribute('aria-expanded', 'true');
      document.body.style.overflow = 'hidden';
    }
    function closeMenu() {
      hamburger.classList.remove('open');
      navLinks.classList.remove('open');
      backdrop.classList.remove('open');
      hamburger.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
    }

    hamburger.addEventListener('click', () =>
      hamburger.classList.contains('open') ? closeMenu() : openMenu()
    );
    closeBtn.addEventListener('click', closeMenu);
    backdrop.addEventListener('click', closeMenu);
    navLinks.querySelectorAll('a').forEach(a => a.addEventListener('click', closeMenu));
  </script>
</body>
</html>
